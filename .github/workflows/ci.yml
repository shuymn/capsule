name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: true

      - name: Set up Task
        uses: shuymn/github-actions/.github/actions/setup-task@a8738b31f97fc93c8d7254ea6a9524152997bf68

      - name: Check formatting
        run: task fmt:check

      - name: Run Clippy
        run: task lint

  test:
    name: Test
    needs: lint
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: true

      - name: Set up Task
        uses: shuymn/github-actions/.github/actions/setup-task@a8738b31f97fc93c8d7254ea6a9524152997bf68

      - name: Run tests
        run: task test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache: true

      - name: Set up Task
        uses: shuymn/github-actions/.github/actions/setup-task@a8738b31f97fc93c8d7254ea6a9524152997bf68

      - name: Build workspace
        run: task build
