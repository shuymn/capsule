name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cross

      - name: Build release binary
        run: $CARGO_CMD build --package capsule-cli --release --locked --target "$TARGET"
        env:
          CARGO_CMD: ${{ matrix.cross && 'cross' || 'cargo' }}
          TARGET: ${{ matrix.target }}

      - name: Create archive
        run: tar -czf "capsule-${GITHUB_REF_NAME}-${TARGET}.tar.gz" -C "target/${TARGET}/release" capsule
        env:
          TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: capsule-${{ matrix.target }}
          path: capsule-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Extract release notes
        run: |
          if [ -f crates/cli/CHANGELOG.md ]; then
            version="${GITHUB_REF_NAME#v}"
            awk "/^## \\[${version}\\]/{if(p) exit; p=1; next} /^## \\[/{if(p) exit} p" crates/cli/CHANGELOG.md > /tmp/release-notes.md
          else
            touch /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        run: |
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            "artifacts/capsule-aarch64-apple-darwin/capsule-${TAG_NAME}-aarch64-apple-darwin.tar.gz" \
            "artifacts/capsule-x86_64-unknown-linux-gnu/capsule-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            "artifacts/capsule-aarch64-unknown-linux-gnu/capsule-${TAG_NAME}-aarch64-unknown-linux-gnu.tar.gz"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
