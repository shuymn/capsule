# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: Show available tasks
    summary: |
      Lists public tasks.
      For machine-readable discovery, use: task --list --json
    cmds:
      - task --list

  build:
    desc: Build the workspace
    summary: |
      Builds the workspace with Cargo using the lockfile as-is.
    cmds:
      - cargo build --workspace --locked

  build:release:
    desc: Build optimized artifacts
    summary: |
      Builds the workspace in release mode.
    cmds:
      - cargo build --workspace --release --locked

  run:
    desc: Run the default binary
    summary: |
      Runs the capsule binary.
    cmds:
      - cargo run -p capsule-cli

  test:
    desc: Run all tests
    summary: |
      Runs unit, integration, and documentation tests across the workspace.
    cmds:
      - cargo test --workspace --all-targets --all-features --locked

  doc:
    desc: Build documentation
    summary: |
      Builds documentation for the workspace without dependency docs.
    cmds:
      - cargo doc --workspace --no-deps

  lint:
    desc: Run Clippy
    summary: |
      Runs Clippy across the workspace and treats warnings as errors.
      Pedantic, nursery, and cargo lint groups are enabled from src (see main.rs / future lib.rs).
      Thresholds: clippy.toml. Levels: Cargo.toml [lints].
    cmds:
      - cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  fmt:check:
    desc: Check formatting
    summary: |
      Verifies Rust formatting without modifying files.
      Uses the repo toolchain (nightly) so rustfmt.toml unstable options apply.
    cmds:
      - cargo fmt --all -- --check

  fmt:fix:
    aliases: [fmt]
    desc: Format code
    summary: |
      Formats all Rust sources in the workspace (nightly rustfmt; see rustfmt.toml).
    cmds:
      - cargo fmt --all

  clean:
    desc: Remove build artifacts
    summary: |
      Removes Cargo build artifacts.
    cmds:
      - cargo clean

  install:lefthook:
    internal: true
    desc: Install git hooks if needed
    summary: |
      Ensures lefthook hooks are installed.
      Requires lefthook to be installed and available on PATH.
    preconditions:
      - sh: command -v lefthook >/dev/null 2>&1
        msg: "lefthook is not installed. Please install it first."
    status:
      - test -f .git/hooks/pre-commit
      - grep -q lefthook .git/hooks/pre-commit
    cmds:
      - lefthook install

  check:fast:
    desc: Run fast local verification
    summary: |
      Runs formatting checks, linting, and a normal build.
    deps:
      - task: install:lefthook
        silent: true
    cmds:
      - task: fmt:check
      - task: lint
      - task: build

  check:full:
    aliases: [check]
    desc: Run full verification
    summary: |
      Runs formatting checks, linting, tests, documentation build, and build.
    deps:
      - task: install:lefthook
        silent: true
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: doc
      - task: build

  bench:prompt:
    desc: Benchmark capsule against starship
    summary: |
      Builds the release binary and runs the prompt benchmark.
      capsule is measured via direct daemon socket; starship via subprocess.
      Requires starship and git to be installed locally.
    cmds:
      - task: build:release
      - cargo run -p capsule-prompt-bench --bin prompt-bench --release -- --capsule-bin target/release/capsule

  docker:linux:build:
    desc: Build the Linux CI Docker image
    summary: |
      Builds the helper image used to run Linux CI-equivalent checks locally.
      Uses buildx with BuildKit caching for faster rebuilds.
      Override the image name with CAPSULE_LINUX_CI_IMAGE.
    cmds:
      - docker buildx build --load --file docker/linux-ci.Dockerfile --tag ${CAPSULE_LINUX_CI_IMAGE:-capsule-linux-ci} .

  docker:linux:lint:
    desc: Run Linux lint checks in Docker
    summary: |
      Runs the same lint path as ubuntu-latest CI inside a Linux container.
      The workspace is bind-mounted; build artifacts are written with the current UID/GID.
    deps:
      - task: docker:linux:build
        silent: true
    cmds:
      - docker run --rm -it --user $(id -u):$(id -g) --env CARGO_HOME=/tmp/cargo --env RUSTUP_HOME=/tmp/rustup --volume ${PWD}:/workspace --workdir /workspace ${CAPSULE_LINUX_CI_IMAGE:-capsule-linux-ci} sh -c 'task lint'

  docker:linux:check:
    desc: Run full Linux verification in Docker
    summary: |
      Runs CI-equivalent verification inside a Linux container for local parity.
      This task intentionally skips lefthook installation and invokes the underlying checks directly.
      The workspace is bind-mounted; build artifacts are written with the current UID/GID.
    deps:
      - task: docker:linux:build
        silent: true
    cmds:
      - docker run --rm -it --user $(id -u):$(id -g) --env CARGO_HOME=/tmp/cargo --env RUSTUP_HOME=/tmp/rustup --volume ${PWD}:/workspace --workdir /workspace ${CAPSULE_LINUX_CI_IMAGE:-capsule-linux-ci} sh -c 'task fmt:check && task lint && task test && task doc && task build'
